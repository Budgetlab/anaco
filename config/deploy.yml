# Configuration Kamal 2 pour workers Solid Queue sur GCP

service: anaco-workers
image: alexandraleschi/anaco-workers

minimum_version: 2.0.0
primary_role: workers
retain_containers: 1

servers:
  workers:
    hosts:
      - 34.155.115.62
    cmd: bin/jobs
    proxy: false
    labels:
      worker-type: solid-queue
      application: anaco
      environment: production
    options:
      health-cmd: "pgrep -f 'bin/jobs' || exit 1"
      health-interval: 10s
      health-timeout: 5s
      health-retries: 10
      health-start-period: 90s

registry:
  username: alexandraleschi
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: Dockerfile.workers

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_SERVE_STATIC_FILES: "false"

    USE_CLOUD_SQL_PROXY: "true"
    APP_URL: "https://budgetlab.finances.gouv.fr/anaco"

    JOB_CONCURRENCY: "4"
    SOLID_QUEUE_SKIP_RECURRING: "false"

    PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    GOOGLE_PROJECT_ID: "apps-354210"
    STORAGE_BUCKET_NAME: "anaco-bucket"

  secret:
    - SECRET_KEY_BASE
    - RAILS_MASTER_KEY
    - PRODUCTION_DB_PASSWORD
    - PRODUCTION_DB_NAME
    - PRODUCTION_DB_USERNAME
    - CLOUD_SQL_CONNECTION_NAME

ssh:
  user: alexandra
  keys:
    - ~/.ssh/google_compute_engine

volumes:
  - anaco-storage:/rails/storage
  - anaco-logs:/rails/log

accessories:
  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
    service: cloud-sql-proxy
    hosts:
      - 34.155.115.62
    cmd: >
      --address 0.0.0.0
      --port 5432
      apps-354210:europe-west1:budgetlab